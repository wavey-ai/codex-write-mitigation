name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Check shell syntax
        run: sh -n bin/* scripts/*.sh tests/*.sh
      - name: Run regression tests
        run: ./tests/test.sh
